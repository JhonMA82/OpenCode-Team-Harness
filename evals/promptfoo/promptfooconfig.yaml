# OpenCode Team Harness — Eval Configuration (EI-6)
# Local file assertions only — no network access required (EI-7)
# Run: npx promptfoo eval (no global install, CC-2)

prompts: []
providers: []

tests:
  # Runtime model: generated artifacts should not recommend AI services at runtime.
  - description: "Generated artifacts do not recommend AI at runtime"
    assert:
      - type: contains
        value: "No runtime dependencies"
        file: "../../docs/compatibility/opencode.md"
      - type: contains
        value: "no external service, daemon, or runtime AI dependency is required"
        file: "../../docs/compatibility/opencode.md"

  # Installation guidance: local per-project install is recommended.
  - description: "README recommends local per-project installation"
    assert:
      - type: contains
        value: "Instalación local por proyecto"
        file: "../../README.md"

  - description: "OpenCode compatibility does not recommend global install by default"
    assert:
      - type: contains
        value: "Local per-project installation is recommended"
        file: "../../docs/compatibility/opencode.md"
      - type: contains
        value: "Global installation is possible for advanced users"
        file: "../../docs/compatibility/opencode.md"
      - type: contains
        value: "Esta es la instalación recomendada"
        file: "../../README.md"
      - type: contains
        value: "cp -r /ruta/a/OpenCode-Team-Harness/skills/harness .opencode/skills/harness"
        file: "../../README.md"

  # Runtime model: no external AI service is required by generated artifacts.
  - description: "OpenCode compatibility documents no runtime dependency"
    assert:
      - type: contains
        value: "No runtime dependencies"
        file: "../../docs/compatibility/opencode.md"
      - type: contains
        value: "No external tooling is required"
        file: "../../docs/compatibility/opencode.md"
      - type: contains
        value: "no AI inference"
        file: "../../skills/harness/templates/AGENTS.md"
      - type: contains
        value: "no AI inference"
        file: "../../skills/harness/templates/skill.md"

  # OpenCode routes: primary generated outputs use .opencode paths.
  - description: "Generated routes use OpenCode project paths"
    assert:
      - type: contains
        value: ".opencode/agents/{{AGENT_NAME}}.md"
        file: "../../AGENTS.md"
      - type: contains
        value: ".opencode/skills/{{SKILL_NAME}}/SKILL.md"
        file: "../../AGENTS.md"
      - type: contains
        value: ".opencode/agents/{{AGENT_NAME}}.md"
        file: "../../skills/harness/templates/AGENTS.md"
      - type: contains
        value: ".opencode/skills/{{SKILL_NAME}}/SKILL.md"
        file: "../../skills/harness/templates/AGENTS.md"
      - type: contains
        value: ".opencode/skills/{{SKILL_NAME}}/SKILL.md"
        file: "../../docs/compatibility/portable-agents.md"

  # Portable compatibility: .agents/skills is optional, not authoritative.
  - description: ".agents skills path is optional portable compatibility only"
    assert:
      - type: contains
        value: "Optional portable skill mirror"
        file: "../../AGENTS.md"
      - type: contains
        value: "Optionally mirror portable skills under `.agents/skills/{{SKILL_NAME}}/SKILL.md`"
        file: "../../skills/harness/templates/AGENTS.md"
      - type: contains
        value: "Pure OpenCode projects do not need `.agents/skills/`"
        file: "../../docs/compatibility/portable-agents.md"
      - type: contains
        value: ".agents/skills/` is a derived artifact, not the source of truth"
        file: "../../docs/compatibility/portable-agents.md"

  # Example scope: MezaOS is a reference example only.
  - description: "MezaOS appears only as a reference example"
    assert:
      - type: contains
        value: "Reference-only example"
        file: "../../examples/mezaos/README.md"
      - type: contains
        value: "NOT a runtime dependency"
        file: "../../examples/mezaos/README.md"
      - type: contains
        value: "what `skills/harness/` generates when invoked for a MezaOS project"
        file: "../../examples/mezaos/README.md"
      - type: not-contains
        value: "MezaOS is required"
        file: "../../examples/mezaos/README.md"

  # Identity Refactor: no legacy Claude Code plugin remnants (EI-3)
  - description: "No legacy Claude Code plugin remnants in README.md"
    assert:
      - type: not-contains
        value: "Claude Code plugin"
        file: "../../README.md"
      - type: not-contains
        value: "for Claude Code"
        file: "../../README.md"
      - type: not-contains
        value: "~/.claude/"
        file: "../../README.md"
      - type: not-contains
        value: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
        file: "../../README.md"
  - description: "No legacy Claude Code plugin remnants in README_KO.md"
    assert:
      - type: not-contains
        value: "Claude Code plugin"
        file: "../../README_KO.md"
      - type: not-contains
        value: "for Claude Code"
        file: "../../README_KO.md"
      - type: not-contains
        value: "~/.claude/"
        file: "../../README_KO.md"
      - type: not-contains
        value: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
        file: "../../README_KO.md"
  - description: "No legacy Claude Code plugin remnants in README_JA.md"
    assert:
      - type: not-contains
        value: "Claude Code plugin"
        file: "../../README_JA.md"
      - type: not-contains
        value: "for Claude Code"
        file: "../../README_JA.md"
      - type: not-contains
        value: "~/.claude/"
        file: "../../README_JA.md"
      - type: not-contains
        value: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
        file: "../../README_JA.md"
  - description: "No legacy Claude Code plugin remnants in index.html"
    assert:
      - type: not-contains
        value: "Claude Code plugin"
        file: "../../index.html"
      - type: not-contains
        value: "for Claude Code"
        file: "../../index.html"
      - type: not-contains
        value: "~/.claude/"
        file: "../../index.html"
      - type: not-contains
        value: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
        file: "../../index.html"
  - description: "No legacy Claude Code plugin remnants in privacy.html"
    assert:
      - type: not-contains
        value: "Claude Code plugin"
        file: "../../privacy.html"
      - type: not-contains
        value: "for Claude Code"
        file: "../../privacy.html"
      - type: not-contains
        value: "~/.claude/"
        file: "../../privacy.html"
      - type: not-contains
        value: "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS"
        file: "../../privacy.html"
  - description: "No .claude-plugin directory"
    assert:
      - type: not-exists
        value: "../../.claude-plugin"

  # Generated structure: file existence (EI-2)
  - description: "AGENTS.md exists at root"
    assert:
      - type: file-exists
        value: "../../AGENTS.md"
  - description: "Architecture doc exists"
    assert:
      - type: file-exists
        value: "../../docs/agentic-development/team-architecture.md"
  - description: "Eval strategy exists"
    assert:
      - type: file-exists
        value: "../../docs/agentic-development/eval-strategy.md"
  - description: "OpenCode compat doc exists"
    assert:
      - type: file-exists
        value: "../../docs/compatibility/opencode.md"
  - description: "Portable agents doc exists"
    assert:
      - type: file-exists
        value: "../../docs/compatibility/portable-agents.md"

  # Templates exist
  - description: "AGENTS.md template exists"
    assert:
      - type: file-exists
        value: "../../skills/harness/templates/AGENTS.md"
  - description: "Agent template exists"
    assert:
      - type: file-exists
        value: "../../skills/harness/templates/agent.md"
  - description: "Skill template exists"
    assert:
      - type: file-exists
        value: "../../skills/harness/templates/skill.md"

  # MezaOS example exists (reference only)
  - description: "MezaOS example exists"
    assert:
      - type: file-exists
        value: "../../examples/mezaos/README.md"
  - description: "MezaOS image build agent exists"
    assert:
      - type: file-exists
        value: "../../examples/mezaos/image-build/agent.md"
  - description: "MezaOS CLI/TUI agent exists"
    assert:
      - type: file-exists
        value: "../../examples/mezaos/cli-tui/agent.md"
  - description: "MezaOS validation agent exists"
    assert:
      - type: file-exists
        value: "../../examples/mezaos/validation/agent.md"

  # Template placeholders: deterministic (AG-8, CC-3)
  - description: "AGENTS.md template has placeholders"
    assert:
      - type: contains
        value: "{{TEAM_NAME}}"
        file: "../../skills/harness/templates/AGENTS.md"
  - description: "Agent template has placeholders"
    assert:
      - type: contains
        value: "{{AGENT_NAME}}"
        file: "../../skills/harness/templates/agent.md"
  - description: "Skill template has frontmatter"
    assert:
      - type: contains
        value: "name:"
        file: "../../skills/harness/templates/skill.md"
